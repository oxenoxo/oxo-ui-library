<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab导航 · Dossier Tabs</title>
  <style>
    :root {
      --ink-800: #0a0d14;
      --gold-500: #d4af6a;
      --gold-600: #b89152;
      --gold-700: #8f6f3a;
      --text-dim: #b0a890;
      --text-mute: #6e6a5c;
      --line: rgba(212, 175, 106, 0.18);
      --line-strong: rgba(212, 175, 106, 0.42);
      --mono: "SF Mono", Monaco, Menlo, monospace;
      --serif: "Songti SC", "SimSun", serif;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #07090f;
      color: #ece4cf;
      padding: 20px;
    }
    /* ============ Tabs ============ */
    .dossier-tabs {
      position: sticky;
      top: 0;
      z-index: 50;
      margin: 20px -14px 0;
      padding: 14px 14px;
      background: rgba(10, 13, 20, 0.92);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .dossier-tab-buttons {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 4px;
      background: rgba(7, 9, 15, 0.6);
    }
    .dossier-tab-buttons::-webkit-scrollbar { display: none; }
    .dossier-tab-btn {
      flex: 1;
      min-width: 90px;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      border-radius: 999px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    .dossier-tab-btn .num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-mute);
      margin-right: 6px;
    }
    .dossier-tab-btn.active {
      background: linear-gradient(180deg, var(--gold-500), var(--gold-600));
      color: #0a0d14;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(212, 175, 106, 0.25), inset 0 1px 0 rgba(255, 245, 220, 0.4);
    }
    .dossier-tab-btn.active .num {
      color: var(--ink-800);
      opacity: 0.7;
    }
    .dossier-tab-panel { display: none; }
    .dossier-tab-panel.active { display: block; animation: dossier-tab-fadeIn 0.5s ease; }
    @keyframes dossier-tab-fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="dossier-tabs">
    <div class="dossier-tab-buttons">
      <button class="dossier-tab-btn active" data-tab="bio"><span class="num">01</span>生地会考</button>
      <button class="dossier-tab-btn" data-tab="final"><span class="num">02</span>期末考试</button>
      <button class="dossier-tab-btn" data-tab="calc"><span class="num">03</span>计算原理</button>
    </div>
  </div>

  <section class="dossier-tab-panel active" id="bio">
    <p style="padding:20px; color:var(--text-dim);">生地会考内容区域</p>
  </section>
  <section class="dossier-tab-panel" id="final">
    <p style="padding:20px; color:var(--text-dim);">期末考试内容区域</p>
  </section>
  <section class="dossier-tab-panel" id="calc">
    <p style="padding:20px; color:var(--text-dim);">计算原理内容区域</p>
  </section>

  <script>
    const tabButtons = document.querySelectorAll('.dossier-tab-btn');
    const panels = document.querySelectorAll('.dossier-tab-panel');
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        tabButtons.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
