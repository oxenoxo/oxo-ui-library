<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公式卡片 · Dossier Formula</title>
  <style>
    :root {
      --ink-900: #07090f;
      --gold-300: #e4c989;
      --gold-500: #d4af6a;
      --gold-600: #b89152;
      --text: #ece4cf;
      --text-dim: #b0a890;
      --text-mute: #6e6a5c;
      --line: rgba(212, 175, 106, 0.18);
      --serif: "Songti SC", "SimSun", serif;
      --mono: "SF Mono", Monaco, Menlo, monospace;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: var(--ink-900);
      color: var(--text);
      padding: 20px;
    }
    /* ============ 公式卡片 ============ */
    .dossier-formula-block {
      text-align: center;
      padding: 36px 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        radial-gradient(ellipse at center, rgba(212, 175, 106, 0.06), transparent 70%),
        linear-gradient(180deg, rgba(16, 20, 29, 0.5), rgba(10, 13, 20, 0.3));
      margin-bottom: 24px;
      position: relative;
    }
    .dossier-formula-block::before,
    .dossier-formula-block::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border: 1px solid var(--gold-500);
    }
    .dossier-formula-block::before {
      top: 10px; left: 10px;
      border-right: none; border-bottom: none;
    }
    .dossier-formula-block::after {
      bottom: 10px; right: 10px;
      border-left: none; border-top: none;
    }
    .dossier-formula-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold-500);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .dossier-formula {
      font-family: var(--mono);
      font-size: clamp(14px, 4vw, 18px);
      color: var(--text);
      line-height: 1.8;
      letter-spacing: 0.02em;
      padding: 14px 0;
    }
    .dossier-formula .gold { color: var(--gold-300); }
    .dossier-formula .mute { color: var(--text-mute); }
    .dossier-formula-caption {
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      color: var(--text-dim);
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }
    .dossier-formula-caption b {
      color: var(--gold-500);
      font-weight: 500;
      font-style: normal;
    }
  </style>
</head>
<body>
  <div class="dossier-formula-block">
    <div class="dossier-formula-label">期末奖励 · FINAL EXAM FORMULA</div>
    <div class="dossier-formula">
      <span class="gold">奖金</span> &nbsp;=&nbsp; 700 <span class="mute">×</span>
      <br>
      <span class="mute">(</span> <span class="gold">(总分 − 560) / 30</span> <span class="mute">)</span><sup style="font-size: 0.65em;">2</sup>
    </div>
    <div class="dossier-formula-caption">
      这不是线性奖励——而是 <b>加速回报</b>。<br>
      分数越高，每 1 分的价值增长越快。
    </div>
  </div>
</body>
</html>
