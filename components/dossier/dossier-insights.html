<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略启示 · Dossier Insights</title>
  <style>
    :root {
      --ink-700: #10141d;
      --gold-500: #d4af6a;
      --gold-600: #b89152;
      --text: #ece4cf;
      --text-dim: #b0a890;
      --text-mute: #6e6a5c;
      --line: rgba(212, 175, 106, 0.18);
      --line-faint: rgba(212, 175, 106, 0.08);
      --serif: "Songti SC", "SimSun", serif;
      --mono: "SF Mono", Monaco, Menlo, monospace;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #07090f;
      color: var(--text);
      padding: 20px;
    }
    /* ============ 策略启示 ============ */
    .dossier-insights {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(16, 20, 29, 0.5), rgba(10, 13, 20, 0.3));
      margin-bottom: 24px;
    }
    .dossier-insights-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .dossier-insights-title .tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--gold-500);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
    }
    .dossier-insight-list {
      display: grid;
      gap: 0;
    }
    .dossier-insight-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px dashed var(--line);
    }
    .dossier-insight-item:last-child { border-bottom: none; }
    .dossier-insight-no {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gold-500);
      letter-spacing: 0.15em;
      padding-top: 2px;
    }
    .dossier-insight-body .k {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .dossier-insight-body .k em {
      font-style: italic;
      color: var(--gold-500);
      font-weight: 400;
    }
    .dossier-insight-body .v {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.7;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="dossier-insights">
    <div class="dossier-insights-title">
      <span>策略启示</span>
      <span class="tag">INSIGHTS</span>
    </div>
    <div class="dossier-insight-list">
      <div class="dossier-insight-item">
        <div class="dossier-insight-no">01</div>
        <div class="dossier-insight-body">
          <div class="k"><em>边际递增</em>效应</div>
          <div class="v">分数越接近目标，每 1 分的奖金价值越高。奖励曲线是指数型上扬——而不是平直的线性。</div>
        </div>
      </div>
      <div class="dossier-insight-item">
        <div class="dossier-insight-no">02</div>
        <div class="dossier-insight-body">
          <div class="k"><em>临界点</em>战略</div>
          <div class="v">从 585 到 590 的 5 分，价值是 560 到 565 的 11 倍。越是尾段，越值得死磕。</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
