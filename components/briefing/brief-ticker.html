<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数据滚动条</title><style>
:root{--bg:#F7F7F2;--ink:#151515;--muted:#6B7280;--orange:#E86F2D;--blue:#284B63;--green:#5B8C6A}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.ticker{max-width:1320px;margin:18px auto;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #111;border-bottom:1px solid #111}.tick{padding:14px 16px;border-right:1px solid #111}.tick:last-child{border-right:0}.tick b{display:block;font-size:20px}.tick span{color:var(--muted);font-size:12px}
</style></head><body><section class="ticker"><div class="tick"><b>24</b><span>监控事件</span></div><div class="tick"><b>7</b><span>高可信信源</span></div><div class="tick"><b>3</b><span>需要跟进</span></div><div class="tick"><b>1</b><span>潜在机会</span></div></section></body></html>
