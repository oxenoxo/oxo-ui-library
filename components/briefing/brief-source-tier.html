<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>信源分级面板</title><style>
:root{--bg:#F7F7F2;--ink:#151515;--muted:#6B7280;--line:#D7D7CE;--blue:#284B63;--green:#5B8C6A;--orange:#E86F2D}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.panel{max-width:320px;border:1px solid #111;background:#fff;padding:20px}.panel h2{margin:0 0 14px;font-size:18px}.tier{display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.tier:last-child{border-bottom:0}.badge{height:32px;display:grid;place-items:center;border-radius:6px;font-weight:900;font-size:13px;letter-spacing:.1em}.badge.official{background:#D1FAE5;color:#065F46}.badge.media{background:#DBEAFE;color:#1E40AF}.badge.unconfirmed{background:#FEF3C7;color:#92400E}.tier b{display:block;font-size:14px}.tier span{color:var(--muted);font-size:12px}
</style></head><body><section class="panel"><h2>信源分级</h2><div class="tier"><div class="badge official">L1</div><div><b>官方发布</b><span>公司博客、论文、开源仓库</span></div></div><div class="tier"><div class="badge media">L2</div><div><b>权威媒体</b><span>科技媒体、研究机构、采访</span></div></div><div class="tier"><div class="badge unconfirmed">L3</div><div><b>待确认</b><span>社媒爆料、转述、截图</span></div></div></section></body></html>
