<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>时间线+行动面板</title><style>
:root{--bg:#F7F7F2;--ink:#151515;--muted:#6B7280;--line:#D7D7CE;--blue:#284B63}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.side{max-width:320px;display:grid;gap:16px}.panel{border:1px solid #111;background:#fff;padding:20px}.panel h2{margin:0 0 14px;font-size:18px}.timeline{display:grid;gap:10px}.time{display:grid;grid-template-columns:56px 1fr;gap:10px;font-size:14px}.time b{color:var(--blue);font-weight:900}.actions{display:grid;gap:10px}.action{padding:12px;border:1px solid var(--line);border-radius:6px;background:#FBFBF8}.action b{display:block;font-size:14px;margin-bottom:3px}.action span{color:var(--muted);font-size:12px}
</style></head><body><aside class="side"><section class="panel"><h2>时间线</h2><div class="timeline"><div class="time"><b>08:30</b><div>抓取热点列表，去重归类。</div></div><div class="time"><b>09:10</b><div>核验一级信源，标记风险。</div></div><div class="time"><b>10:00</b><div>生成晨报与今日行动。</div></div></div></section><section class="panel"><h2>今日行动</h2><div class="actions"><div class="action"><b>补充 4 个视频 case</b><span>优先第一人称游戏视角</span></div><div class="action"><b>更新模型对比表</b><span>增加世界模型字段</span></div></div></section></aside></body></html>
