<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>公式卡片组</title><style>
:root{--bg:#080811;--panel:#111220;--line:rgba(255,255,255,.1);--text:#F8FAFC;--muted:#9CA3AF;--blue:#68B6FF;--gold:#F2C46D}*{box-sizing:border-box}body{margin:0;background:#080811;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.panel{max-width:640px;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.045);padding:22px}.panel h2{margin:0 0 16px;font-size:20px}.formula{font-family:"SF Mono",Menlo,monospace;display:grid;gap:10px}.formula div{padding:16px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-size:14px;color:var(--muted)}.formula div em{color:var(--blue);font-style:normal}
</style></head><body><section class="panel"><h2>计算公式</h2><div class="formula"><div>总分 = <em>Σ 科目折算分</em> + 加权奖励</div><div>增值 = <em>当前分</em> - 基线分</div><div>奖励 = f(总分档位, 单科满分, <em>增值幅度</em>)</div><div>风险线 = <em>目标分</em> - 当前预测分</div></div></section></body></html>
