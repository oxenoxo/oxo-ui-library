<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>策略说明网格</title><style>
:root{--bg:#080811;--panel:#111220;--line:rgba(255,255,255,.1);--text:#F8FAFC;--muted:#9CA3AF;--blue:#68B6FF;--gold:#F2C46D}*{box-sizing:border-box}body{margin:0;background:#080811;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.strategy{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:900px;margin:auto}.s{padding:18px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.035)}.s b{display:block;font-size:15px;margin-bottom:6px;color:var(--blue)}.s span{color:var(--muted);font-size:13px;line-height:1.7}
</style></head><body><section class="strategy"><div class="s"><b>策略一</b><span>先锁定高权重科目，避免总分被大科拖累。</span></div><div class="s"><b>策略二</b><span>用增值奖励覆盖基础薄弱但进步明显的情况。</span></div><div class="s"><b>策略三</b><span>单科满分单独标记，增强正反馈。</span></div><div class="s"><b>策略四</b><span>规则面向执行，少讲复杂数学，多讲行动路径。</span></div></section></body></html>
