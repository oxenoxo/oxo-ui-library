<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>总分Hero区</title><style>
:root{--bg:#080811;--panel:#111220;--line:rgba(255,255,255,.1);--text:#F8FAFC;--muted:#9CA3AF;--red:#F06464;--gold:#F2C46D;--blue:#68B6FF;--green:#79D8A5}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 8%,rgba(240,100,100,.18),transparent 26%),radial-gradient(circle at 78% 4%,rgba(242,196,109,.18),transparent 28%),#080811;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.hero{max-width:1360px;margin:auto;border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:30px;display:grid;grid-template-columns:1fr 380px;gap:24px;box-shadow:0 30px 90px rgba(0,0,0,.35)}.hero small{color:var(--gold);letter-spacing:.18em;font-weight:900}.hero h1{font-size:52px;margin:12px 0;letter-spacing:-.06em}.hero p{color:var(--muted);line-height:1.8}.total{border:1px solid rgba(242,196,109,.28);border-radius:26px;padding:24px;background:linear-gradient(135deg,rgba(242,196,109,.16),rgba(240,100,100,.08))}.total span{color:var(--muted)}.total b{display:block;font-size:70px;line-height:1;color:var(--gold);letter-spacing:-.06em}
</style></head><body><header class="hero"><div><small>SCORE RULE SYSTEM</small><h1>期末考试计分规则仪表盘</h1><p>适合总分规则、奖励档位、增值计算、科目权重和策略说明。</p></div><div class="total"><span>目标总分</span><b>740</b><span>参考中考方式，保留可扩展科目权重。</span></div></header></body></html>
