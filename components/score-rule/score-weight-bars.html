<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>科目权重条</title><style>
:root{--bg:#080811;--panel:#111220;--line:rgba(255,255,255,.1);--text:#F8FAFC;--muted:#9CA3AF;--blue:#68B6FF;--gold:#F2C46D}*{box-sizing:border-box}body{margin:0;background:#080811;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.panel{max-width:640px;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.045);padding:22px}.panel h2{margin:0 0 16px;font-size:20px}.subjects{display:grid;gap:12px}.sub{display:grid;grid-template-columns:96px 1fr 70px;gap:14px;align-items:center;padding:14px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06)}.sub b{font-size:16px}.bar{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--gold))}.score{text-align:right;color:var(--gold);font-weight:900}
</style></head><body><section class="panel"><h2>科目权重</h2><div class="subjects"><div class="sub"><b>语文</b><div class="bar"><i style="width:82%"></i></div><div class="score">120</div></div><div class="sub"><b>数学</b><div class="bar"><i style="width:82%"></i></div><div class="score">120</div></div><div class="sub"><b>英语</b><div class="bar"><i style="width:82%"></i></div><div class="score">120</div></div><div class="sub"><b>物理</b><div class="bar"><i style="width:68%"></i></div><div class="score">100</div></div><div class="sub"><b>历史</b><div class="bar"><i style="width:45%"></i></div><div class="score">70</div></div></div></section></body></html>
