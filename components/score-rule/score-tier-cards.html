<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>档位卡片</title><style>
:root{--bg:#080811;--panel:#111220;--line:rgba(255,255,255,.1);--text:#F8FAFC;--muted:#9CA3AF;--red:#F06464;--gold:#F2C46D;--green:#79D8A5}*{box-sizing:border-box}body{margin:0;background:#080811;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:auto}.tier{border:1px solid var(--line);border-radius:26px;padding:22px;background:rgba(255,255,255,.04)}.tier small{font-size:11px;letter-spacing:.18em;font-weight:900}.tier h3{font-size:22px;margin:12px 0 8px;letter-spacing:-.02em}.tier p{color:var(--muted);font-size:14px;line-height:1.7;margin:0}.tier:first-child{border-color:rgba(242,196,109,.28);background:linear-gradient(180deg,rgba(242,196,109,.12),rgba(255,255,255,.03))}.tier:first-child small{color:var(--gold)}.tier:first-child h3{color:var(--gold)}.tier:nth-child(2){border-color:rgba(240,100,100,.22)}.tier:nth-child(2) small{color:var(--red)}.tier:nth-child(2) h3{color:var(--red)}.tier:last-child{border-color:rgba(255,255,255,.12)}.tier:last-child small{color:var(--muted)}.tier:last-child h3{color:var(--muted)}
</style></head><body><section class="tiers"><article class="tier"><small>TOP</small><h3>王座档</h3><p>总分达到顶级目标，奖励集中体现稀缺性和仪式感。</p></article><article class="tier"><small>BOOST</small><h3>暴击档</h3><p>对关键科目或明显增值进行额外奖励，鼓励突破。</p></article><article class="tier"><small>BASELINE</small><h3>生死线</h3><p>低于关键线触发预警，优先解释差距与补救路径。</p></article></section></body></html>
