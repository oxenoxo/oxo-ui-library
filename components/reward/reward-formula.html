<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reward-formula - 公式卡片</title>
  <style>
    :root {
      --gold: #f6cc7b;
      --gold-3: #ffe5ad;
      --mono: "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #07080d;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.045));
      box-shadow: 0 18px 58px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      max-width: 760px;
      width: 100%;
    }

    .formula-card { padding: 20px; }

    .formula-title {
      color: var(--gold);
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .formula {
      margin-top: 14px;
      padding: 17px 14px;
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid rgba(246, 204, 123, 0.2);
      background: rgba(0,0,0,0.24);
      color: var(--gold-3);
      font-family: var(--mono);
      font-size: clamp(15px, 4vw, 19px);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="card formula-card">
    <div class="formula-title">Final Exam Formula</div>
    <div class="formula">奖金 = 700 × ((你的总分 − 560) / 30)²</div>
  </div>
</body>
</html>
