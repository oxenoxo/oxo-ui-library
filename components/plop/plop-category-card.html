<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOP Category Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .plop-category-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .plop-category-card .inner {
            display: flex;
            min-height: 180px;
        }
        .plop-category-card .left {
            flex: 1;
            border-right: 1px solid #000;
            padding: 24px;
            display: flex;
            align-items: flex-start;
        }
        .plop-category-card .visit-btn {
            border: 2px solid #000;
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .plop-category-card .right {
            flex: 1;
            background: #F15A24;
            padding: 24px;
            color: #fff;
            border-top-right-radius: 40px;
        }
        .plop-category-card .domain {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .plop-category-card .card-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
        }

        @media (min-width: 768px) {
            .plop-category-card {
                max-width: 600px;
            }
            .plop-category-card .inner {
                min-height: 220px;
            }
            .plop-category-card .left,
            .plop-category-card .right {
                padding: 32px;
            }
            .plop-category-card .card-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="plop-category-card">
        <div class="inner">
            <div class="left">
                <button class="visit-btn">
                    VISIT <span>→</span>
                </button>
            </div>
            <div class="right">
                <p class="domain">DOMAIN.COM</p>
                <h3 class="card-title">Card Heading<br>Description Placeholder</h3>
            </div>
        </div>
    </div>
</body>
</html>
