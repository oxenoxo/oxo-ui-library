<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOP Stats Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .plop-stats-grid {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .plop-stats-grid .inner {
            display: flex;
            gap: 20px;
        }
        .plop-stats-grid .stats-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .plop-stats-grid .stat-item .number {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            line-height: 1;
            letter-spacing: -1px;
        }
        .plop-stats-grid .stat-item .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .plop-stats-grid .visual-col {
            flex: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .plop-stats-grid .visual {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 1;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: #9FE1CB;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.08), 10px 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: rgba(0,0,0,0.15);
            text-align: center;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .plop-stats-grid {
                max-width: 600px;
                padding: 48px;
            }
            .plop-stats-grid .stat-item .number {
                font-size: 40px;
            }
            .plop-stats-grid .visual {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="plop-stats-grid">
        <div class="inner">
            <div class="stats-col">
                <div class="stat-item">
                    <div class="number">75%</div>
                    <div class="label">Label A</div>
                </div>
                <div class="stat-item">
                    <div class="number">15%</div>
                    <div class="label">Label B</div>
                </div>
                <div class="stat-item">
                    <div class="number">10%</div>
                    <div class="label">Label C</div>
                </div>
            </div>
            <div class="visual-col">
                <div class="visual">DETAILED<br>ASSET</div>
            </div>
        </div>
    </div>
</body>
</html>
