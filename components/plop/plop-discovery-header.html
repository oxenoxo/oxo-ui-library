<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOP Discovery Header</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .plop-discovery-header {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .plop-discovery-header .top {
            background: #FFE600;
            padding: 48px 24px 64px;
            position: relative;
        }
        .plop-discovery-header .title {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.2;
            color: #000;
            margin-bottom: 16px;
        }
        .plop-discovery-header .visual {
            width: 200px;
            height: 120px;
            margin: 0 auto;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: #F0997B;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.08), 10px 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            position: relative;
            z-index: 1;
        }

        @media (min-width: 768px) {
            .plop-discovery-header {
                max-width: 600px;
            }
            .plop-discovery-header .top {
                padding: 64px 48px 80px;
            }
            .plop-discovery-header .title {
                font-size: 32px;
            }
            .plop-discovery-header .visual {
                width: 280px;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="plop-discovery-header">
        <div class="top">
            <h2 class="title">Discovery Heading<br>Placeholder Text</h2>
            <div class="visual">CATEGORY ASSET</div>
        </div>
    </div>
</body>
</html>
