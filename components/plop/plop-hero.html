<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOP Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .plop-hero {
            width: 100%;
            max-width: 400px;
            background: #FFE600;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            padding: 48px 24px 140px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .plop-hero .tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #000;
            margin-bottom: 8px;
            opacity: 0.6;
        }
        .plop-hero .title {
            font-size: 56px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -3px;
            color: #000;
            font-style: italic;
        }
        .plop-hero .visual {
            width: 220px;
            height: 220px;
            margin: 32px auto 0;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: #9FE1CB;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.08), 10px 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: rgba(0,0,0,0.15);
        }
        .plop-hero .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
        }
        .plop-hero .subtitle {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            color: #000;
            margin-bottom: 4px;
        }
        .plop-hero .desc {
            font-size: 10px;
            color: rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .plop-hero .cta-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .plop-hero .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }
        .plop-hero .cta-btn {
            flex: 1;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-family: inherit;
        }
        .plop-hero .cta-btn .arrow {
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .plop-hero {
                max-width: 480px;
                padding: 64px 40px 160px;
            }
            .plop-hero .title {
                font-size: 72px;
            }
            .plop-hero .visual {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="plop-hero">
        <div class="tag">The Universe of Toys</div>
        <h1 class="title">LOGO<br>NAME</h1>
        <div class="visual">VISUAL ASSET</div>
        <div class="bottom">
            <div class="subtitle">Secondary Heading<br>Description Line</div>
            <div class="desc">Tagline or mini description goes here</div>
            <div class="cta-row">
                <div class="avatar">G</div>
                <div class="avatar">A</div>
                <button class="cta-btn">
                    <span>GET STARTED</span>
                    <span class="arrow">→</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
