<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOP About Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .plop-about-section {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .plop-about-section .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #bbb;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .plop-about-section .content {
            display: flex;
            gap: 16px;
        }
        .plop-about-section .text-col {
            flex: 2;
        }
        .plop-about-section .text {
            font-size: 13px;
            line-height: 1.6;
            color: #555;
        }
        .plop-about-section .img-col {
            flex: 1;
            display: flex;
            align-items: flex-start;
        }
        .plop-about-section .img-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: #F4C0D1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .plop-about-section .img-placeholder .circle {
            width: 50%;
            height: 50%;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
        }

        @media (min-width: 768px) {
            .plop-about-section {
                max-width: 600px;
                padding: 48px;
            }
            .plop-about-section .text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="plop-about-section">
        <p class="label">About</p>
        <div class="content">
            <div class="text-col">
                <p class="text">
                    Detailed description paragraph placeholder. This area is used for longer text blocks providing context about the section or category.
                </p>
            </div>
            <div class="img-col">
                <div class="img-placeholder">
                    <div class="circle"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
