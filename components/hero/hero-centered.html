<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居中Hero区域</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 120px var(--spacing-lg) var(--spacing-xxl);
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 50%);
      opacity: 0.1;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.1; }
      50% { transform: scale(1.1); opacity: 0.15; }
    }

    .hero-badge {
      display: inline-block;
      padding: var(--spacing-xs) var(--spacing-md);
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--accent);
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: var(--spacing-lg);
      position: relative;
      z-index: 1;
    }

    .hero-title {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: var(--spacing-md);
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: var(--spacing-xl);
      position: relative;
      z-index: 1;
    }

    .hero-actions {
      display: flex;
      gap: var(--spacing-md);
      position: relative;
      z-index: 1;
    }

    .hero-actions .btn {
      padding: var(--spacing-sm) var(--spacing-xl);
      font-size: 16px;
      font-weight: 600;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 36px;
      }

      .hero-subtitle {
        font-size: 16px;
      }

      .hero-actions {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <!-- 居中Hero区域 -->
  <section class="hero">
    <div class="hero-badge">🚀 新版本已发布 v2.0</div>
    
    <h1 class="hero-title">构建令人惊叹的<br>数字体验</h1>
    
    <p class="hero-subtitle">
      用最简洁的工具，创造最强大的产品。专为现代团队设计的协作平台。
    </p>
    
    <div class="hero-actions">
      <a href="#cta" class="btn btn-primary">免费开始</a>
      <a href="#demo" class="btn btn-secondary">观看演示</a>
    </div>
  </section>
</body>
</html>
