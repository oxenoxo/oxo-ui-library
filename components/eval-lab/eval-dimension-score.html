<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>能力维度评分矩阵</title><style>
:root{--paper:#F3F0E8;--ink:#111827;--muted:#64748B;--line:#D7D0C1;--blue:#2F5D8C;--gold:#B8892D;--green:#477A5D;--red:#A6423D}*{box-sizing:border-box}body{margin:0;background:#171717;color:var(--ink);font-family:ui-serif,Georgia,"Times New Roman",serif}.wrap{width:min(620px,calc(100% - 48px));margin:32px auto;padding:28px;background:linear-gradient(180deg,#FAF7EF,#EEE8DA);box-shadow:0 35px 120px rgba(0,0,0,.45);border-radius:10px}.panel{border:1px solid var(--line);background:rgba(255,255,255,.28);padding:24px;border-radius:4px}.panel h2{font-size:20px;margin:0 0 18px;letter-spacing:-.02em}.matrix{display:grid;gap:10px}.row{display:grid;grid-template-columns:110px 1fr 48px;align-items:center;gap:14px;font-family:"SF Mono",monospace;font-size:12px}.bar{height:12px;background:#DDD4C4;position:relative;border-radius:2px}.bar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px}.score{font-weight:900}
</style></head><body><main class="wrap"><section class="panel"><h2>能力维度评分</h2><div class="matrix"><div class="row"><span>物理一致性</span><div class="bar"><i style="width:78%"></i></div><b class="score">78</b></div><div class="row"><span>交互响应</span><div class="bar"><i style="width:64%"></i></div><b class="score">64</b></div><div class="row"><span>视角稳定</span><div class="bar"><i style="width:71%"></i></div><b class="score">71</b></div><div class="row"><span>目标保持</span><div class="bar"><i style="width:83%"></i></div><b class="score">83</b></div><div class="row"><span>可控性</span><div class="bar"><i style="width:59%"></i></div><b class="score">59</b></div></div></section></main></body></html>
