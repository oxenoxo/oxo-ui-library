<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>结论先行判定卡</title><style>
:root{--paper:#F3F0E8;--ink:#111827;--muted:#64748B;--line:#D7D0C1;--red:#A6423D;--blue:#2F5D8C;--gold:#B8892D;--green:#477A5D}*{box-sizing:border-box}body{margin:0;background:#171717;color:var(--ink);font-family:ui-serif,Georgia,"Times New Roman",serif}.wrap{width:min(600px,calc(100% - 48px));margin:32px auto;padding:28px;background:linear-gradient(180deg,#FAF7EF,#EEE8DA);box-shadow:0 35px 120px rgba(0,0,0,.45);border-radius:10px}.verdict{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.vcard{border:1px solid var(--line);padding:18px;background:rgba(255,255,255,.38)}.vcard span{font-family:"SF Mono",monospace;font-size:11px;color:var(--muted)}.vcard b{display:block;margin-top:12px;font-size:30px}
</style></head><body><main class="wrap"><div class="verdict"><div class="vcard"><span>BEST OVERALL</span><b>HY-W2</b></div><div class="vcard"><span>RISK LEVEL</span><b style="color:var(--red)">中</b></div><div class="vcard"><span>CASES</span><b>42</b></div></div></main></body></html>
