<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>模型对比卡片</title><style>
:root{--paper:#F3F0E8;--ink:#111827;--muted:#64748B;--line:#D7D0C1;--red:#A6423D;--blue:#2F5D8C;--gold:#B8892D;--green:#477A5D}*{box-sizing:border-box}body{margin:0;background:#171717;color:var(--ink);font-family:ui-serif,Georgia,"Times New Roman",serif}.wrap{width:min(900px,calc(100% - 48px));margin:32px auto;padding:28px;background:linear-gradient(180deg,#FAF7EF,#EEE8DA);box-shadow:0 35px 120px rgba(0,0,0,.45);border-radius:10px}.panel{border:1px solid var(--line);background:rgba(255,255,255,.28);padding:24px;border-radius:4px}.panel h2{font-size:20px;margin:0 0 18px;letter-spacing:-.02em}.models{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.model{border:1px solid var(--line);padding:16px;min-height:180px;background:rgba(255,255,255,.28)}.model h3{margin:0 0 12px;font-size:18px}.model p{font-size:14px;line-height:1.7;color:#475569}.tag{display:inline-block;border:1px solid var(--line);padding:5px 8px;margin:6px 4px 0 0;font-size:12px;color:var(--muted)}
</style></head><body><main class="wrap"><section class="panel"><h2>模型对比</h2><div class="models"><div class="model"><h3>Happy Oyster</h3><p>表现稳健，适合低动态游戏视角；复杂操作下容易出现目标漂移。</p><span class="tag">稳定</span><span class="tag">低动态</span></div><div class="model"><h3>HY-World 2.0</h3><p>综合能力最佳，空间保持好；但在强交互时仍需人工复核。</p><span class="tag">综合强</span><span class="tag">可控</span></div><div class="model"><h3>Genie</h3><p>探索性强，交互潜力高；画面细节与一致性仍不够稳定。</p><span class="tag">交互潜力</span><span class="tag">实验型</span></div></div></section></main></body></html>
