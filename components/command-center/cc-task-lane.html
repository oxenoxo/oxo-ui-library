<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>A/B任务泳道</title><style>
:root{--bg:#050713;--panel:rgba(255,255,255,.065);--panel2:rgba(255,255,255,.035);--line:rgba(255,255,255,.12);--text:#F8FAFC;--muted:#94A3B8;--cyan:#79DFFF;--violet:#8B7CFF;--gold:#EACB7A;--green:#7DE2B8;--red:#FF8A8A}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;background:linear-gradient(135deg,#050713,#0D1224)}.board{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;margin:auto}.lane{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));border-radius:28px;box-shadow:0 26px 80px rgba(0,0,0,.32);backdrop-filter:blur(18px);padding:22px}.lane h2{font-size:16px;margin:0 0 18px;display:flex;justify-content:space-between;align-items:center}.lane h2 span{font-size:11px;color:var(--muted);letter-spacing:.14em}.task{padding:16px;border-radius:20px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);margin-bottom:12px}.task b{display:block;font-size:16px;margin-bottom:6px}.task p{margin:0;color:var(--muted);font-size:13px;line-height:1.6}.meta{margin-top:12px;display:flex;gap:10px}.meta span{padding:4px 10px;border-radius:8px;font-size:11px;background:rgba(255,255,255,.06);color:var(--muted)}.lane:first-child .task .meta span:first-child{background:rgba(121,223,255,.14);color:var(--cyan)}
</style></head><body><section class="board"><div class="lane"><h2>A 层：主线深度 <span>DEEP</span></h2><div class="task"><b>完成 UI 模板 demo 规划</b><p>确定日常高频类型，输出可预览候选页面。</p><div class="meta"><span>90 min</span><span>交付物优先</span></div></div><div class="task"><b>筛选可入库模板</b><p>从 demo 中挑出最适合组件库沉淀的方向。</p><div class="meta"><span>45 min</span><span>决策</span></div></div></div><div class="lane"><h2>B 层：等待填充 <span>FILL</span></h2><div class="task"><b>整理参考素材</b><p>收集可替换为图像资源的封面、纹理、插画方向。</p><div class="meta"><span>20 min</span><span>可插队</span></div></div><div class="task"><b>更新组件标签</b><p>完善 L1/L2 分类与标签体系。</p><div class="meta"><span>25 min</span><span>轻量</span></div></div></div></section></body></html>
