<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI等待队列</title><style>
:root{--bg:#050713;--panel:rgba(255,255,255,.065);--panel2:rgba(255,255,255,.035);--line:rgba(255,255,255,.12);--text:#F8FAFC;--muted:#94A3B8;--green:#7DE2B8;--gold:#EACB7A;--violet:#8B7CFF}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;background:linear-gradient(135deg,#050713,#0D1224)}.queue{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));border-radius:28px;box-shadow:0 26px 80px rgba(0,0,0,.32);backdrop-filter:blur(18px);padding:22px;max-width:340px}.queue h2{font-size:16px;margin:0 0 18px}.queue-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}.queue-item:last-child{border-bottom:0}.queue-item span{color:var(--muted)}.pill{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:900}.pill:first-of-type{background:rgba(125,226,184,.14);color:var(--green)}
</style></head><body><section class="queue"><h2>AI 等待队列</h2><div class="queue-item"><span>截图验证</span><b class="pill">自动</b></div><div class="queue-item"><span>文案压缩</span><b class="pill" style="background:rgba(234,203,122,.14);color:var(--gold)">低负荷</b></div><div class="queue-item"><span>组件入库</span><b class="pill" style="background:rgba(139,124,255,.14);color:var(--violet)">待确认</b></div></section></body></html>
