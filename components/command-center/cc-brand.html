<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>品牌标识+导航侧栏</title><style>
:root{--bg:#050713;--panel:rgba(255,255,255,.065);--panel2:rgba(255,255,255,.035);--line:rgba(255,255,255,.12);--text:#F8FAFC;--muted:#94A3B8;--cyan:#79DFFF;--violet:#8B7CFF;--gold:#EACB7A;--green:#7DE2B8;--red:#FF8A8A}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at 10% 0,rgba(121,223,255,.2),transparent 28%),radial-gradient(circle at 70% 10%,rgba(139,124,255,.18),transparent 30%),linear-gradient(135deg,#050713,#0D1224 58%,#070914)}.sidebar{max-width:310px;padding:24px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));border-radius:28px;box-shadow:0 26px 80px rgba(0,0,0,.32);backdrop-filter:blur(18px)}.brand{height:92px;border-radius:24px;background:linear-gradient(135deg,rgba(121,223,255,.16),rgba(234,203,122,.08));border:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:18px}.mark{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--gold));color:#07101C;display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:18px}.brand span{font-size:12px;color:var(--muted)}.nav{margin-top:24px;display:grid;gap:10px}.nav div{padding:13px 14px;border-radius:16px;color:#D8E2F0;border:1px solid transparent}.nav div.active{background:linear-gradient(135deg,rgba(121,223,255,.18),rgba(139,124,255,.12));border-color:rgba(121,223,255,.28);color:white}.focus{margin-top:24px;padding:18px;border-radius:22px;background:rgba(0,0,0,.2);border:1px solid var(--line)}.focus small{color:var(--cyan);font-weight:900;letter-spacing:.18em}.focus h3{margin:10px 0 6px}.focus p{color:var(--muted);font-size:13px;line-height:1.7}
</style></head><body><aside class="sidebar"><div class="brand"><div class="mark">OX</div><div><b>Daily Command</b><span>今日执行中心</span></div></div><nav class="nav"><div class="active">主线深度任务</div><div>等待填充任务</div><div>AI 执行队列</div><div>复盘与归档</div></nav><section class="focus"><small>TODAY FOCUS</small><h3>3 条主线</h3><p>先交付、再优化、最后归档。保持 A 层不被碎片打断。</p></section></aside></body></html>
