<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修仙修炼卡片</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .cultivation-card {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
      border: 1px solid var(--xianxia-purple);
      border-radius: var(--border-radius-lg);
      padding: var(--spacing-lg);
      max-width: 320px;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .cultivation-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(155, 89, 182, 0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity var(--transition-slow);
    }

    .cultivation-card:hover::before {
      opacity: 1;
    }

    .cultivation-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 8px 32px rgba(155, 89, 182, 0.4);
      border-color: var(--xianxia-gold);
    }

    .cultivation-card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      position: relative;
    }

    .cultivation-card-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--xianxia-purple), var(--xianxia-gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 20px rgba(155, 89, 182, 0.5);
    }

    .cultivation-card-level {
      font-size: 12px;
      color: var(--xianxia-gold);
      font-weight: 600;
    }

    .cultivation-card-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .cultivation-card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: var(--spacing-md);
      position: relative;
    }

    .cultivation-card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-sm);
      padding: var(--spacing-md) 0;
      border-top: 1px solid var(--border-color);
      position: relative;
    }

    .cultivation-stat {
      text-align: center;
    }

    .cultivation-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .cultivation-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--xianxia-gold);
    }

    .cultivation-card-btn {
      width: 100%;
      padding: var(--spacing-sm);
      background: linear-gradient(135deg, var(--xianxia-purple), var(--xianxia-gold));
      border: none;
      border-radius: var(--border-radius);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
    }

    .cultivation-card-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(155, 89, 182, 0.6);
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(155, 89, 182, 0.4); }
      50% { box-shadow: 0 0 40px rgba(155, 89, 182, 0.8); }
    }

    .cultivation-card:hover .cultivation-card-icon {
      animation: glow 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <!-- 修仙修炼卡片组件 -->
  <div class="cultivation-card">
    <div class="cultivation-card-header">
      <div class="cultivation-card-icon">⚡</div>
      <div>
        <div class="cultivation-card-level">筑基期 · 三层</div>
        <h3 class="cultivation-card-name">雷电术</h3>
      </div>
    </div>
    
    <p class="cultivation-card-desc">
      引天雷之力，凝聚于指尖，释放狂暴的雷电攻击。威力随境界提升而增强。
    </p>
    
    <div class="cultivation-card-stats">
      <div class="cultivation-stat">
        <div class="cultivation-stat-label">伤害</div>
        <div class="cultivation-stat-value">856</div>
      </div>
      <div class="cultivation-stat">
        <div class="cultivation-stat-label">消耗</div>
        <div class="cultivation-stat-value">120</div>
      </div>
      <div class="cultivation-stat">
        <div class="cultivation-stat-label">冷却</div>
        <div class="cultivation-stat-value">3s</div>
      </div>
    </div>
    
    <button class="cultivation-card-btn">开始修炼</button>
  </div>
</body>
</html>
