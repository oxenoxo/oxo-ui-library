<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>风险雷达面板</title><style>
:root{--bg:#0A0E0C;--panel:#101815;--line:rgba(178,255,219,.15);--text:#EFFFF7;--muted:#8BA89A;--green:#70F0B4;--yellow:#E8D16A;--red:#F17C73;--blue:#74B8FF}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(112,240,180,.18),transparent 30%),linear-gradient(135deg,#070B09,#111A17);color:var(--text);font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.panel{max-width:360px;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:26px;padding:22px}.panel h2{margin:0 0 16px;font-size:18px}.risk{display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(178,255,219,.08)}.risk:last-child{border-bottom:0}.risk b{font-size:14px;color:var(--yellow)}.risk div b{display:block;font-size:14px;color:var(--text)}.risk div span{color:var(--muted);font-size:12px;line-height:1.5}
</style></head><body><section class="panel"><h2>风险雷达</h2><div class="risk"><b>R1</b><div>线上部署延迟<br><span>GitHub Pages 生效需等待</span></div></div><div class="risk"><b>R2</b><div>分类过粗<br><span>二级类目需随组件增长维护</span></div></div><div class="risk"><b>R3</b><div>素材版权<br><span>外部图像需标记来源</span></div></div></section></body></html>
