<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>战情室Hero区</title><style>
:root{--bg:#0A0E0C;--panel:#101815;--line:rgba(178,255,219,.15);--text:#EFFFF7;--muted:#8BA89A;--green:#70F0B4;--yellow:#E8D16A;--red:#F17C73;--blue:#74B8FF}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(112,240,180,.18),transparent 30%),linear-gradient(135deg,#070B09,#111A17);color:var(--text);font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.hero{max-width:1480px;margin:auto;border:1px solid var(--line);background:linear-gradient(135deg,rgba(112,240,180,.1),rgba(255,255,255,.035));border-radius:28px;padding:28px;display:flex;justify-content:space-between;align-items:end}.hero h1{font-size:52px;margin:0;letter-spacing:-.06em}.hero p{margin:10px 0 0;color:var(--muted)}.status{display:flex;gap:12px}.stat{min-width:110px;padding:16px;border-radius:18px;background:rgba(0,0,0,.22);border:1px solid var(--line)}.stat b{font-size:28px;display:block}.stat span{display:block;color:var(--muted);font-size:12px}
