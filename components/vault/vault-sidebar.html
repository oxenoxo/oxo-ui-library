<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>资产分类侧栏</title><style>
:root{--bg:#100D09;--panel:#1C1710;--line:rgba(216,196,163,.22);--text:#F7EEDB;--muted:#B29D7C;--gold:#D6A95A;--rust:#A65E3F;--green:#8DAA77}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 5%,rgba(214,169,90,.17),transparent 30%),linear-gradient(135deg,#100D09,#21180F);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.sidebar{max-width:290px;padding:22px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:26px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.seal{height:130px;border-radius:22px;background:linear-gradient(135deg,rgba(214,169,90,.22),rgba(166,94,63,.12));border:1px solid var(--line);display:grid;place-items:center;text-align:center}.seal b{font-size:26px;letter-spacing:.12em}.seal p{margin:6px 0 0;color:var(--muted);font-size:13px}.filters{margin-top:22px;display:grid;gap:10px}.filter{padding:13px 14px;border-radius:16px;border:1px solid transparent;color:var(--muted)}.filter.active{background:rgba(214,169,90,.16);border-color:rgba(214,169,90,.32);color:var(--text)}
