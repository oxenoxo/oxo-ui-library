<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>资产详情面板</title><style>
:root{--bg:#100D09;--panel:#1C1710;--line:rgba(216,196,163,.22);--text:#F7EEDB;--muted:#B29D7C;--gold:#D6A95A;--green:#8DAA77}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 5%,rgba(214,169,90,.17),transparent 30%),linear-gradient(135deg,#100D09,#21180F);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.detail{max-width:360px;padding:22px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:26px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.detail h2{font-size:18px;margin:0 0 18px}.preview{height:180px;border-radius:18px;background:linear-gradient(135deg,rgba(214,169,90,.18),rgba(255,255,255,.04));border:1px solid var(--line);margin-bottom:18px;display:grid;place-items:center;color:var(--muted);font-size:13px}.kv{display:grid;gap:12px;margin-bottom:20px}.kv div{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(216,196,163,.1)}.kv span{color:var(--muted);font-size:13px}.kv b{font-size:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{padding:13px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:13px;text-align:center}.btn.primary{background:linear-gradient(135deg,rgba(214,169,90,.28),rgba(214,169,90,.12));border-color:rgba(214,169,90,.32);color:var(--gold)}
</style></head><body><aside class="detail"><h2>资产详情</h2><div class="preview">预览区域</div><div class="kv"><div><span>类型</span><b>HTML Template</b></div><div><span>状态</span><b>可拆解</b></div><div><span>风格</span><b>Dark / Premium</b></div><div><span>用途</span><b>组件库入库候选</b></div></div><div class="actions"><button class="btn primary">解析入库</button><button class="btn">复制路径</button></div></aside></body></html>
