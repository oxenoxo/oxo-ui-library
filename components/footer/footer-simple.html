<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单页脚组件</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .footer-simple {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: var(--spacing-xxl) var(--spacing-lg);
      color: var(--text-secondary);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-xl);
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-column h4 {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: var(--spacing-md);
    }

    .footer-links {
      list-style: none;
    }

    .footer-links li {
      margin-bottom: var(--spacing-sm);
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: color var(--transition-fast);
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    .footer-bottom {
      margin-top: var(--spacing-xxl);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .social-links {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .social-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 18px;
      transition: color var(--transition-fast);
    }

    .social-links a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <!-- 简单页脚组件 -->
  <footer class="footer-simple">
    <div class="footer-grid">
      <div class="footer-column">
        <h4>产品</h4>
        <ul class="footer-links">
          <li><a href="#">功能</a></li>
          <li><a href="#">定价</a></li>
          <li><a href="#">更新日志</a></li>
          <li><a href="#">路线图</a></li>
        </ul>
      </div>

      <div class="footer-column">
        <h4>资源</h4>
        <ul class="footer-links">
          <li><a href="#">文档</a></li>
          <li><a href="#">API参考</a></li>
          <li><a href="#">社区</a></li>
          <li><a href="#">博客</a></li>
        </ul>
      </div>

      <div class="footer-column">
        <h4>公司</h4>
        <ul class="footer-links">
          <li><a href="#">关于我们</a></li>
          <li><a href="#">招聘</a></li>
          <li><a href="#">联系我们</a></li>
          <li><a href="#">隐私政策</a></li>
        </ul>
      </div>

      <div class="footer-column">
        <h4>关注我们</h4>
        <div class="social-links">
          <a href="#" title="GitHub">⚡</a>
          <a href="#" title="Twitter">⚡</a>
          <a href="#" title="Discord">⚡</a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <p>© 2026 oxo-ui-library. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
