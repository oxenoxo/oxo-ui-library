<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录表单组件</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .login-form {
      max-width: 400px;
      margin: 0 auto;
      padding: var(--spacing-xxl) var(--spacing-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }

    .form-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color var(--transition-fast);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      font-size: 13px;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--text-secondary);
    }

    .form-link {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .form-link:hover {
      color: var(--accent-hover);
    }

    .btn-login {
      width: 100%;
      padding: var(--spacing-md);
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--border-radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .form-divider {
      text-align: center;
      margin: var(--spacing-lg) 0;
      position: relative;
      color: var(--text-muted);
      font-size: 13px;
    }

    .form-divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 45%;
      height: 1px;
      background: var(--border-color);
    }

    .form-divider::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      width: 45%;
      height: 1px;
      background: var(--border-color);
    }

    .social-login {
      display: flex;
      gap: var(--spacing-md);
    }

    .social-btn {
      flex: 1;
      padding: var(--spacing-sm);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
    }

    .social-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- 登录表单组件 -->
  <form class="login-form" onsubmit="return false;">
    <div class="login-header">
      <h2>欢迎回来</h2>
      <p>登录你的账户以继续</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">邮箱地址</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">密码</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••">
    </div>

    <div class="form-options">
      <label class="form-checkbox">
        <input type="checkbox"> 记住我
      </label>
      <a href="#" class="form-link">忘记密码？</a>
    </div>

    <button type="submit" class="btn-login">登录</button>

    <div class="form-divider">或使用第三方登录</div>

    <div class="social-login">
      <div class="social-btn" title="GitHub">⚡</div>
      <div class="social-btn" title="Google">⚡</div>
      <div class="social-btn" title="微信">💬</div>
    </div>
  </form>
</body>
</html>
