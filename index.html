<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oxo-ui-library - 组件库</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --bg-card: #1e1e3a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --text-muted: #6c6c80;
      --accent: #00d4ff;
      --accent-hover: #00b8e6;
      --border-color: #2a2a4a;
      --border-radius: 8px;
      --border-radius-lg: 12px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 侧边栏 */
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: var(--spacing-lg);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: var(--spacing-lg);
      color: var(--accent);
    }

    .category-list {
      list-style: none;
    }

    .category-item {
      padding: var(--spacing-sm) var(--spacing-md);
      margin-bottom: var(--spacing-xs);
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .category-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .category-item.active {
      background: var(--accent);
      color: #ffffff;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部工具栏 */
    .toolbar {
      padding: var(--spacing-md) var(--spacing-lg);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
      flex-shrink: 0;
    }

    .search-box {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--border-radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-danger {
      background: #e74c3c;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    /* 组件网格 */
    .components-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-lg);
    }

    .components-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-lg);
    }

    .component-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .component-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      border-color: var(--accent);
    }

    .component-thumbnail {
      width: 100%;
      height: 180px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--text-muted);
      position: relative;
      overflow: hidden;
    }

    .component-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .component-info {
      padding: var(--spacing-md);
    }

    .component-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
    }

    .component-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }

    .tag {
      padding: 2px 8px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--accent);
      border-radius: 12px;
      font-size: 11px;
      color: var(--accent);
    }

    .component-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    .component-actions .btn {
      flex: 1;
      font-size: 12px;
      padding: var(--spacing-xs) var(--spacing-sm);
    }

    /* 预览面板 */
    .preview-panel {
      width: 500px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .preview-header {
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .preview-frame {
      flex: 1;
      border: none;
      background: #ffffff;
      min-height: 400px;
    }

    .code-panel {
      height: 300px;
      overflow-y: auto;
      padding: var(--spacing-md);
      background: #1a1a1a;
      font-family: "SF Mono", Monaco, monospace;
      font-size: 12px;
      line-height: 1.8;
      color: #e0e0e0;
      flex-shrink: 0;
      white-space: pre-wrap;
    }

    .preview-actions {
      padding: var(--spacing-md);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: var(--spacing-sm);
      flex-shrink: 0;
    }

    /* AI模式 */
    .ai-mode .component-card {
      cursor: default;
    }

    .ai-metadata {
      display: none;
      padding: var(--spacing-md);
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .ai-mode .ai-metadata {
      display: block;
    }

    .ai-mode .component-thumbnail,
    .ai-mode .component-actions {
      display: none;
    }

    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: var(--spacing-xl);
      max-width: 500px;
      width: 90%;
    }

    .modal h3 {
      margin-bottom: var(--spacing-md);
    }

    .modal p {
      color: var(--text-secondary);
      margin-bottom: var(--spacing-lg);
      font-size: 14px;
      line-height: 1.8;
    }

    .modal-actions {
      display: flex;
      gap: var(--spacing-md);
      justify-content: flex-end;
    }

    /* 组件详情样式 */
    .detail-section {
      margin-bottom: var(--spacing-lg);
    }

    .detail-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .detail-props-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--spacing-sm);
    }

    .detail-props-table th,
    .detail-props-table td {
      padding: var(--spacing-sm);
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-props-table th {
      color: var(--text-muted);
      font-weight: 600;
    }

    .detail-props-table td {
      color: var(--text-secondary);
    }

    .detail-when-to-use {
      background: var(--bg-tertiary);
      padding: var(--spacing-md);
      border-radius: var(--border-radius);
      margin-top: var(--spacing-sm);
    }

    .detail-when-to-use li {
      margin-bottom: var(--spacing-xs);
      margin-left: var(--spacing-md);
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* 导出按钮 */
    .export-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #ffffff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
      transition: all 0.3s ease;
      z-index: 100;
    }

    .export-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
    }

    /* AI聊天界面 */
    .ai-chat-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 360px;
      height: 480px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 101;
    }

    .ai-chat-panel.active {
      display: flex;
    }

    .ai-chat-header {
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ai-chat-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
    }

    .ai-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-md);
    }

    .ai-message {
      margin-bottom: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--border-radius);
      font-size: 13px;
      line-height: 1.6;
    }

    .ai-message.user {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      margin-left: 20%;
    }

    .ai-message.assistant {
      background: rgba(0, 212, 255, 0.1);
      color: var(--text-primary);
      margin-right: 20%;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .ai-chat-input-area {
      padding: var(--spacing-md);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: var(--spacing-sm);
    }

    .ai-chat-input {
      flex: 1;
      padding: var(--spacing-sm);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 13px;
    }

    .ai-chat-send {
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 13px;
    }

    /* 响应式 */
    @media (max-width: 1200px) {
      .preview-panel {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <div class="sidebar">
    <h2>📦 组件库</h2>
    <ul class="category-list">
      <li class="category-item active" data-category="all">全部组件</li>
      <li class="category-item" data-category="navigation">导航</li>
      <li class="category-item" data-category="hero">Hero</li>
      <li class="category-item" data-category="cards">卡片</li>
      <li class="category-item" data-category="cta">CTA</li>
      <li class="category-item" data-category="xianxia">修仙</li>
      <li class="category-item" data-category="footer">页脚</li>
      <li class="category-item" data-category="forms">表单</li>
      <li class="category-item" data-category="stats">数据</li>
      <li class="category-item" data-category="features">特性</li>
    </ul>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 工具栏 -->
    <div class="toolbar">
      <input type="text" class="search-box" placeholder="搜索组件..." id="searchBox">
      <button class="btn btn-secondary" id="aiModeBtn">AI模式：关</button>
      <button class="btn" id="generatePromptBtn">生成AI提示词</button>
      <button class="btn btn-secondary" id="aiChatToggle">AI聊天</button>
    </div>

    <!-- 组件网格 -->
    <div class="components-area">
      <div class="components-grid" id="componentsGrid"></div>
    </div>
  </div>

  <!-- 预览面板 -->
  <div class="preview-panel">
    <div class="preview-header">预览</div>
    <iframe class="preview-frame" id="previewFrame" src="about:blank"></iframe>
    <div class="code-panel" id="codePanel">点击组件查看代码</div>
    <div class="preview-actions">
      <button class="btn btn-secondary" id="copyCodeBtn">复制代码</button>
      <button class="btn" id="copyIdBtn">复制ID</button>
      <button class="btn btn-secondary" id="detailBtn">详情</button>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>确认删除</h3>
      <p id="deleteMessage">确定要删除这个组件吗？此操作可以恢复。</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 组件详情模态框 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width: 700px; max-height: 80vh; overflow-y: auto;">
      <h3 id="detailTitle">组件详情</h3>
      <div id="detailContent"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="closeDetailBtn">关闭</button>
      </div>
    </div>
  </div>

  <!-- 导出按钮 -->
  <button class="export-btn" id="exportBtn">📦 批量导出</button>

  <!-- AI聊天面板 -->
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="ai-chat-header">
      <span>🤖 AI助手</span>
      <button class="ai-chat-close" id="aiChatClose">×</button>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
      <div class="ai-message assistant">
        你好！我是组件库AI助手。你可以让我：<br>
        • 添加新组件<br>
        • 修改现有组件<br>
        • 删除组件<br>
        • 搜索组件<br>
        • 生成页面
      </div>
    </div>
    <div class="ai-chat-input-area">
      <input type="text" class="ai-chat-input" id="aiChatInput" placeholder="输入指令...">
      <button class="ai-chat-send" id="aiChatSend">发送</button>
    </div>
  </div>

  <script>
    // 组件数据（内嵌，避免 file:// 协议的 fetch 限制）
    const COMPONENTS_DATA = {"schema_version": "1.0", "last_updated": "2026-05-06T16:25:00+08:00", "library_path": "/Users/oxohuang/oxo-ui-library", "components": [{"id": "navbar-dark", "name": "暗色导航栏", "category": "navigation", "tags": ["导航", "响应式", "暗色", "固定顶部", "毛玻璃"], "meta_path": "components/navigation/navbar-dark.meta.json", "file_path": "components/navigation/navbar-dark.html", "thumbnail": "thumbnails/navigation/navbar-dark.png"}, {"id": "hero-centered", "name": "居中Hero区域", "category": "hero", "tags": ["Hero", "CTA", "全屏", "科技感", "暗色"], "meta_path": "components/hero/hero-centered.meta.json", "file_path": "components/hero/hero-centered.html", "thumbnail": "thumbnails/hero/hero-centered.png"}, {"id": "card-product", "name": "产品卡片", "category": "cards", "tags": ["卡片", "产品展示", "悬停动效", "暗色"], "meta_path": "components/cards/card-product.meta.json", "file_path": "components/cards/card-product.html", "thumbnail": "thumbnails/cards/card-product.png"}, {"id": "cta-centered", "name": "居中CTA区域", "category": "cta", "tags": ["CTA", "居中", "暗色", "双按钮"], "meta_path": "components/cta/cta-centered.meta.json", "file_path": "components/cta/cta-centered.html", "thumbnail": "thumbnails/cta/cta-centered.png"}, {"id": "cultivation-card", "name": "修仙修炼卡片", "category": "xianxia", "tags": ["修仙", "卡片", "技能展示", "紫金配色", "动效"], "meta_path": "components/xianxia/cultivation-card.meta.json", "file_path": "components/xianxia/cultivation-card.html", "thumbnail": "thumbnails/xianxia/cultivation-card.png"}, {"id": "footer-simple", "name": "简单页脚", "category": "footer", "tags": ["页脚", "链接", "多栏", "响应式"], "meta_path": "components/footer/footer-simple.meta.json", "file_path": "components/footer/footer-simple.html", "thumbnail": "thumbnails/footer/footer-simple.png"}, {"id": "form-login", "name": "登录表单", "category": "forms", "tags": ["表单", "登录", "第三方登录", "暗色"], "meta_path": "components/forms/form-login.meta.json", "file_path": "components/forms/form-login.html", "thumbnail": "thumbnails/forms/form-login.png"}, {"id": "stats-grid", "name": "数据网格", "category": "stats", "tags": ["数据", "统计", "网格", "趋势"], "meta_path": "components/stats/stats-grid.meta.json", "file_path": "components/stats/stats-grid.html", "thumbnail": "thumbnails/stats/stats-grid.png"}, {"id": "feature-list", "name": "特性列表", "category": "features", "tags": ["特性", "功能展示", "网格布局", "暗色", "卡片"], "meta_path": "components/features/feature-list.meta.json", "file_path": "components/features/feature-list.html", "thumbnail": "thumbnails/features/feature-list.png"}]};

    let components = COMPONENTS_DATA.components;
    let currentCategory = 'all';
    let currentSearch = '';
    let aiMode = false;
    let selectedComponent = null;

    // 加载组件列表
    function loadComponentsData() {
      renderComponents();
    }

    // 渲染组件卡片
    function renderComponents() {
      const grid = document.getElementById('componentsGrid');
      grid.innerHTML = '';

      const filtered = components.filter(comp => {
        const matchCategory = currentCategory === 'all' || comp.category === currentCategory;
        const matchSearch = currentSearch === '' || 
          comp.name.toLowerCase().includes(currentSearch) ||
          comp.tags.some(tag => tag.toLowerCase().includes(currentSearch));
        return matchCategory && matchSearch;
      });

      filtered.forEach(comp => {
        const card = document.createElement('div');
        card.className = 'component-card';
        card.dataset.id = comp.id;

        const thumbnailHtml = comp.thumbnail && comp.thumbnail !== '' 
          ? '<img src="' + comp.thumbnail + '" alt="' + comp.name + '">'
          : '<span>📦</span>';

        card.innerHTML = 
          '<div class="component-thumbnail">' +
            thumbnailHtml +
          '</div>' +
          '<div class="component-info">' +
            '<div class="component-name">' + comp.name + '</div>' +
            '<div class="component-tags">' +
              comp.tags.map(tag => '<span class="tag">#' + tag + '</span>').join('') +
            '</div>' +
            '<div class="component-actions">' +
              '<button class="btn" onclick="previewComponent('' + comp.id + '')">查看演示</button>' +
              '<button class="btn btn-secondary" onclick="copyComponentId('' + comp.id + '')">复制ID</button>' +
              '<button class="btn btn-danger" onclick="deleteComponent('' + comp.id + '')">删除</button>' +
            '</div>' +
          '</div>' +
          '<div class="ai-metadata">' +
            '<pre>' + JSON.stringify({id: comp.id, category: comp.category, tags: comp.tags}, null, 2) + '</pre>' +
          '</div>';

        grid.appendChild(card);
      });
    }

    // 预览组件
    window.previewComponent = function(id) {
      const comp = components.find(c => c.id === id);
      if (!comp) return;

      selectedComponent = comp;
      document.getElementById('previewFrame').src = comp.file_path;

      // 尝试加载代码
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', comp.file_path, true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 0) {
              document.getElementById('codePanel').textContent = xhr.responseText;
            } else {
              document.getElementById('codePanel').textContent = '无法加载代码（请使用本地服务器查看完整功能）';
            }
          }
        };
        xhr.send(null);
      } catch (e) {
        document.getElementById('codePanel').textContent = '代码加载失败：' + e.message;
      }
    };

    // 复制组件ID
    window.copyComponentId = function(id) {
      navigator.clipboard.writeText(id).then(() => {
        alert('已复制组件ID：' + id);
      });
    };

    // 删除组件
    window.deleteComponent = function(id) {
      const comp = components.find(c => c.id === id);
      document.getElementById('deleteMessage').textContent = 
        '确定要删除组件「' + comp.name + '」吗？删除后可以从 history/ 目录恢复。';
      document.getElementById('deleteModal').classList.add('active');
      document.getElementById('confirmDeleteBtn').onclick = function() {
        confirmDelete(id);
      };
    };

    function confirmDelete(id) {
      alert('已标记组件 ' + id + ' 为待删除。AI将在下次同步时执行删除。');
      document.getElementById('deleteModal').classList.remove('active');
    }

    // 显示组件详情
    window.showComponentDetail = function(id) {
      const comp = components.find(c => c.id === id);
      if (!comp) return;

      fetch(comp.meta_path)
        .then(res => res.json())
        .then(meta => {
          let html = '';
          html += '<div class="detail-section">';
          html += '<div class="detail-label">组件名称</div>';
          html += '<div class="detail-value"><strong>' + meta.name + '</strong> (' + meta.id + ')</div>';
          html += '</div>';

          html += '<div class="detail-section">';
          html += '<div class="detail-label">分类</div>';
          html += '<div class="detail-value">' + meta.category + '</div>';
          html += '</div>';

          html += '<div class="detail-section">';
          html += '<div class="detail-label">描述</div>';
          html += '<div class="detail-value">' + (meta.description || '暂无描述') + '</div>';
          html += '</div>';

          html += '<div class="detail-section">';
          html += '<div class="detail-label">标签</div>';
          html += '<div class="detail-value">' + meta.tags.map(t => '`' + t + '`').join(' ') + '</div>';
          html += '</div>';

          if (meta.props && Object.keys(meta.props).length > 0) {
            html += '<div class="detail-section">';
            html += '<div class="detail-label">配置参数 (Props)</div>';
            html += '<table class="detail-props-table">';
            html += '<thead><tr><th>参数名</th><th>类型</th><th>默认值</th><th>说明</th></tr></thead>';
            html += '<tbody>';
            Object.entries(meta.props).forEach(([key, val]) => {
              html += '<tr>';
              html += '<td>' + key + '</td>';
              html += '<td>' + (val.type || '-') + '</td>';
              html += '<td>' + (val.default || '-') + '</td>';
              html += '<td>' + (val.description || '-') + '</td>';
              html += '</tr>';
            });
            html += '</tbody></table>';
            html += '</div>';
          }

          if (meta.when_to_use && meta.when_to_use.length > 0) {
            html += '<div class="detail-section">';
            html += '<div class="detail-label">适用场景</div>';
            html += '<div class="detail-when-to-use"><ul>';
            meta.when_to_use.forEach(w => {
              html += '<li>' + w + '</li>';
            });
            html += '</ul></div>';
            html += '</div>';
          }

          document.getElementById('detailTitle').textContent = '组件详情：' + meta.name;
          document.getElementById('detailContent').innerHTML = html;
          document.getElementById('detailModal').classList.add('active');
        })
        .catch(err => {
          alert('无法加载组件元数据：' + err.message);
        });
    };

    // 关闭详情弹窗
    document.getElementById('closeDetailBtn').addEventListener('click', () => {
      document.getElementById('detailModal').classList.remove('active');
    });

    // 点击详情按钮
    document.getElementById('detailBtn').addEventListener('click', () => {
      if (selectedComponent) {
        showComponentDetail(selectedComponent.id);
      } else {
        alert('请先选择一个组件');
      }
    });

    // 导出所有组件
    document.getElementById('exportBtn').addEventListener('click', () => {
      alert('正在准备导出...（需要服务器环境支持完整导出功能）\n\n当前组件数：' + components.length);
    });

    // AI聊天功能
    document.getElementById('aiChatSend').addEventListener('click', sendAIMessage);
    document.getElementById('aiChatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendAIMessage();
    });

    function sendAIMessage() {
      const input = document.getElementById('aiChatInput');
      const message = input.value.trim();
      if (!message) return;

      const messagesDiv = document.getElementById('aiChatMessages');
      const userMsg = document.createElement('div');
      userMsg.className = 'ai-message user';
      userMsg.textContent = message;
      messagesDiv.appendChild(userMsg);

      input.value = '';

      setTimeout(() => {
        const aiMsg = document.createElement('div');
        aiMsg.className = 'ai-message assistant';
        aiMsg.innerHTML = '收到指令：' + message + '<br>此功能需要连接后端AI服务。<br>当前为演示模式。';
        messagesDiv.appendChild(aiMsg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, 500);
    }

    // 打开/关闭AI聊天面板
    let aiChatOpen = false;

    document.getElementById('aiChatToggle').addEventListener('click', () => {
      aiChatOpen = !aiChatOpen;
      document.getElementById('aiChatPanel').classList.toggle('active', aiChatOpen);
    });

    document.getElementById('aiChatClose').addEventListener('click', () => {
      document.getElementById('aiChatPanel').classList.remove('active');
      aiChatOpen = false;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('aiChatPanel').classList.remove('active');
        aiChatOpen = false;
      }
    });

    // 搜索
    document.getElementById('searchBox').addEventListener('input', (e) => {
      currentSearch = e.target.value.toLowerCase();
      renderComponents();
    });

    // 分类筛选
    document.querySelectorAll('.category-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentCategory = item.dataset.category;
        renderComponents();
      });
    });

    // AI模式切换
    document.getElementById('aiModeBtn').addEventListener('click', () => {
      aiMode = !aiMode;
      document.body.classList.toggle('ai-mode', aiMode);
      document.getElementById('aiModeBtn').textContent = aiMode ? 'AI模式：开' : 'AI模式：关';
    });

    // 生成AI提示词
    document.getElementById('generatePromptBtn').addEventListener('click', () => {
      const prompt = '用我的组件库搭建页面：\n\n组件库路径：/Users/oxohuang/oxo-ui-library\n\n请读取 components/index.json 获取组件列表，然后按我的需求组装页面。';
      navigator.clipboard.writeText(prompt).then(() => {
        alert('AI提示词已复制到剪贴板！');
      });
    });

    // 复制代码
    document.getElementById('copyCodeBtn').addEventListener('click', () => {
      const code = document.getElementById('codePanel').textContent;
      navigator.clipboard.writeText(code).then(() => {
        alert('代码已复制到剪贴板！');
      });
    });

    // 复制ID（预览面板按钮）
    document.getElementById('copyIdBtn').addEventListener('click', () => {
      if (selectedComponent) {
        navigator.clipboard.writeText(selectedComponent.id).then(() => {
          alert('已复制组件ID：' + selectedComponent.id);
        });
      }
    });

    // 取消删除
    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.remove('active');
    });

    // 初始化
    loadComponentsData();
  </script>
</body>
</html>
